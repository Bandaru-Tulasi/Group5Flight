name: Build and deploy ASP.Net Core app to Azure Web App - Group5FlightApp2026

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore Group5Flights.csproj

      - name: Build with dotnet
        run: dotnet build Group5Flights.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish Group5Flights.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F14F11CE371C45DF8256F8F890E0C4F6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_52F9798845574EDBB7834B7740FE8D30 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7F936BA58FAE4E0CBB9FF85C85BACC0B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Group5FlightApp2026'
          slot-name: 'Production'
          package: .